<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- 🔥 PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1f4037">

<title>Yogurt JYM - Empresa</title>

<style>
body{margin:0;font-family:Arial;background:#eef2f3}
header{background:#1f4037;color:#fff;text-align:center;padding:15px}
header img{width:130px;border-radius:50%}

.search{padding:10px}
.search input{width:100%;padding:10px;border-radius:10px;border:none}

.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:15px}
.card{background:#fff;border-radius:12px;padding:10px;text-align:center;box-shadow:0 4px 12px rgba(0,0,0,.1);position:relative}
.card img{width:100%;height:100px;border-radius:10px;background:#ddd}
.price{color:#1f4037;font-weight:bold}
button{background:#1f4037;color:#fff;border:none;padding:6px;border-radius:8px;margin-top:5px}
.like{position:absolute;top:8px;right:8px;font-size:18px;cursor:pointer}

.cart-btn{position:fixed;bottom:15px;right:15px;background:#1f4037;color:#fff;border-radius:50%;width:50px;height:50px;display:flex;align-items:center;justify-content:center;font-size:18px}

.panel{position:fixed;bottom:0;left:0;width:100%;background:#fff;border-top-left-radius:20px;border-top-right-radius:20px;padding:15px;box-shadow:0 -5px 20px rgba(0,0,0,.2);display:none}
.panel input{width:100%;padding:8px;margin:5px 0;border-radius:8px;border:1px solid #ccc}
.panel ul{max-height:120px;overflow:auto;padding:0}
.panel li{list-style:none;padding:5px 0;border-bottom:1px solid #ddd}
.total{font-weight:bold;margin:10px 0}
.whatsapp{width:100%;padding:12px;background:#25D366;color:#fff;border:none;border-radius:10px}
.close{background:red;color:#fff;border:none;padding:5px 10px;border-radius:8px;margin-bottom:10px}

.top{background:#fff;padding:10px;margin:10px;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
</style>

</head>

<body>

<header>
<img src="logo.png">
<h2>YOGURT J.Y.M</h2>
<p> 100% Naturales 🍃🌱• delicioso 🌱🍃</p>
</header>

<div class="search">
<input type="text" id="buscador" placeholder="Buscar yogurt..." oninput="buscar()">
</div>

<div class="top" id="top"></div>
<div class="grid" id="products"></div>

<div class="cart-btn" onclick="toggleCart()">🛒<span id="count">0</span></div>

<div class="panel" id="panel">
<button class="close" onclick="toggleCart()">Cerrar</button>
<h3>Tu pedido</h3>
<input id="nombre" placeholder="Tu nombre">
<input id="direccion" placeholder="Dirección">
<ul id="lista"></ul>
<div class="total">Total: $<span id="total">0</span></div>
<button class="whatsapp" onclick="pedir()">Confirmar Pedido</button>
</div>

<script>

let productos=[
{name:"Fresa",precio:5000,img:"imagen.jpg",like:false,ventas:0},
{name:"Mora",precio:5000,img:"imagen.jpg",like:false,ventas:0},
{name:"Mango",precio:6000,img:"imagen.jpg",like:false,ventas:0},
{name:"Durazno",precio:6000,img:"imagen.jpg",like:false,ventas:0},
{name:"Natural",precio:4000,img:"imagen.jpg",like:false,ventas:0},
{name:"Premium",precio:7000,img:"imagen.jpg",like:false,ventas:0}
];

let carrito=JSON.parse(localStorage.getItem("carrito"))||[];
let total=0;

function guardar(){localStorage.setItem("carrito",JSON.stringify(carrito));}

function renderTop(){
let top=productos.sort((a,b)=>b.ventas-a.ventas)[0];
document.getElementById("top").innerHTML=`🔥 Más vendido: ${top.name}`;
}

function renderProductos(lista=productos){
const cont=document.getElementById("products");
cont.innerHTML="";
lista.forEach((p,i)=>{
cont.innerHTML+=`
<div class="card">
<div class="like" onclick="toggleLike(${i})">${p.like?"❤️":"🤍"}</div>
<img src="${p.img}">
<h4>${p.name}</h4>
<div class="price">$${p.precio}</div>
<button onclick="add(${i})">Agregar</button>
</div>`;
});
}

function buscar(){
let t=document.getElementById("buscador").value.toLowerCase();
renderProductos(productos.filter(p=>p.name.toLowerCase().includes(t)));
}

function toggleLike(i){productos[i].like=!productos[i].like;renderProductos();}

function add(i){carrito.push(productos[i]);productos[i].ventas++;render();guardar();renderTop();}

function render(){
document.getElementById("count").innerText=carrito.length;
let lista=document.getElementById("lista");
lista.innerHTML="";total=0;
carrito.forEach((p,i)=>{
total+=p.precio;
lista.innerHTML+=`<li>${p.name} $${p.precio} <button onclick="remove(${i})">❌</button></li>`;
});
document.getElementById("total").innerText=total;
}

function remove(i){carrito.splice(i,1);render();guardar();}

function toggleCart(){
let p=document.getElementById("panel");
p.style.display=p.style.display==="block"?"none":"block";
}

function pedir(){
let nombre=document.getElementById("nombre").value;
let direccion=document.getElementById("direccion").value;
if(carrito.length==0||!nombre||!direccion){alert("Completa datos");return;}
let msg=`Pedido:%0ACliente: ${nombre}%0ADirección: ${direccion}%0A`;
carrito.forEach(p=>{msg+=`- ${p.name} $${p.precio}%0A`});
msg+=`Total: $${total}`;
window.open(`https://wa.me/573106505193?text=${msg}`);
}

render();
renderProductos();
renderTop();

// 🔥 SERVICE WORKER
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js")
  .then(() => console.log("Service Worker activo"))
  .catch(err => console.log("Error:", err));
}

</script>

</body>
</html>
